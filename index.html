<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS Nước Ép Ultimate</title>
<meta name="theme-color" content="#22c55e">
<style>
body{font-family:Arial;padding:12px;background:#f4f4f4}
textarea,input,select,button{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
.grid{display:grid;grid-template-columns:1fr 110px 90px;gap:6px}
.card{background:#fff;padding:10px;border-radius:10px;margin:8px 0}
pre{white-space:pre-wrap}
</style>
</head>
<body>
<h2>🍹 POS Nước Ép Ultimate</h2>

<div class="card">
<h3>Chọn món nhanh</h3>
 <input
  type="text"
  id="search"
  placeholder="🔍 Tìm món..."
  onkeyup="locMon()"
/>
<select id="mon"></select>
<select id="size">
<option>200</option>
<option>300</option>
<option>500</option>
</select>
<input id="qty" type="number" value="1" min="1">
<button onclick="themMon()">➕ Thêm món</button>
</div>

<div class="card">
<h3>Hoặc nhập thủ công</h3>
<textarea id="order" rows="8" placeholder="2 tao 300"></textarea>
<button onclick="tinhTien()">🧾 Tính tiền</button>
 <button onclick="donMoi()">🆕 Đơn mới</button>
<input id="khachdua" type="number" placeholder="Tiền khách đưa (k)">
</div>

<div class="card">
<h3>Hóa đơn</h3>
<pre id="bill"></pre>
</div>

<div class="card">
<h3>📈 Doanh thu hôm nay</h3>
<div id="revenue"></div>
<button onclick="resetRevenue()">Reset doanh thu</button>
</div>

<script>
const menu={
  "bo":{200:30,300:45,500:65},
  "xoai":{200:30,300:45,500:65},
  "thom":{200:25,300:35,500:50},
  "sapoche":{200:30,300:40,500:60},
  "du_du":{200:30,300:40,500:60},
  "dau_tay":{200:35,300:50,500:70},
  "chuoi":{200:25,300:35,500:50},
  "mang_cau":{200:35,300:50,500:70},
  "chanh_leo":{200:25,300:35,500:50},
  "xoai_thom":{200:30,300:45,500:65},
  "xoai_chanh_leo":{200:30,300:45,500:65},
  "bo_du_du":{200:30,300:45,500:65},
  "bo_sapoche":{200:30,300:45,500:65},
  "bo_cafe":{200:30,300:45,500:65},
  "bo_chuoi":{200:30,300:45,500:65},
  "sapoche_cafe":{200:30,300:45,500:65},
  "dau_chuoi":{200:35,300:50,500:70},
  "dau_xoai":{200:35,300:50,500:70},
  "chuoi_cacao":{200:25,300:35,500:50},
  "chuoi_xoai":{200:30,300:45,500:65},
  "dua":{200:30,300:40,500:60},
  "mit":{200:30,300:45,500:65},
  "tao":{200:30,300:45,500:65},
  "tao_thom":{200:30,300:45,500:65},
  "tao_oi":{200:30,300:45,500:65},
  "buoi":{200:35,300:50,500:80},
  "tao_ca_rot":{200:35,300:50,500:80},
  "tao_coc":{200:30,300:45,500:65},
  "tao_oi_thom":{200:30,300:45,500:65},
  "buoi_5_hang":{200:40,300:55,500:90},
  "ca_rot_da_lat":{200:35,300:50,500:75},
  "nuoc_mia":{200:15,300:20,500:30},
  "rau_ma_nguyen_chat":{200:20,300:30,500:45},
  "rau_ma_duong":{200:20,300:30,500:45},
  "rau_ma_sua":{200:25,300:35,500:50},
  "rau_ma_dau_xanh":{200:25,300:35,500:50},
  "oi":{200:25,300:35,500:55},
  "oi_thom":{200:25,300:35,500:55},
  "oi_hau":{200:25,300:35,500:50},
  "oi_coc":{200:25,300:35,500:55},
  "cam_huu_co_5_hang":{200:35,300:50,500:80},
  "cam_ca_rot":{200:35,300:50,500:75},
  "cam_thom":{200:35,300:50,500:75},
  "cam_tao":{200:35,300:50,500:75},
  "thom_pure":{200:25,300:35,500:55},
  "thom_ca_rot":{200:25,300:35,500:55},
  "thom_hau":{200:25,300:35,500:55},
  "thom_coc":{200:25,300:35,500:55},
  "dua_hau":{200:25,300:35,500:50},
  "dua_hau_ca_rot":{200:25,300:35,500:55},
  "chanh_day":{200:20,300:30,500:40},
  "can_tay":{200:40,300:55,500:90},
  "can_tay_tao":{200:35,300:50,500:75},
  "can_tay_tao_thom":{200:35,300:50,500:75},
  "can_tay_tao_extra":{200:40,300:55,500:85},
  "can_tay_thom":{200:30,300:45,500:65},
  "can_tay_thom_oi":{200:35,300:50,500:75},
  "can_tay_ca_rot":{200:40,300:60,500:90},
  "can_tay_tao_cam_ca_rot":{200:40,300:55,500:85},
  "cai_kale":{200:45,300:60,500:95},
  "kale_tao":{200:35,300:50,500:75},
  "kale_tao_thom":{200:35,300:50,500:75},
  "kale_tao_cam":{200:35,300:50,500:75},
  "kale_thom":{200:30,300:45,500:65},
  "kale_thom_ca_rot_chanh":{200:35,300:50,500:75},
  "cu_den":{200:40,300:55,500:85},
  "cu_den_tao":{200:35,300:50,500:75},
  "cu_den_thom":{200:30,300:45,500:65},
  "cu_den_ca_rot":{200:40,300:60,500:90},
  "cu_den_tao_thom":{200:35,300:50,500:75},
  "cu_den_tao_ca_rot":{200:35,300:50,500:75},
  "cu_den_cam_ca_rot":{200:35,300:50,500:75},
  "green_kale_tao_chuoi":{200:35},
  "green_kale_bo_chuoi":{300:50},
  "green_kale_xoai_thanhlong_chuoi":{500:75},
};

const sel=document.getElementById("mon");
Object.keys(menu).sort().forEach(m=>{
 let o=document.createElement("option");
 o.textContent=m;
 o.value=m;
 sel.appendChild(o);
});

function themMon(){
 let q=document.getElementById("qty").value;
 let m=document.getElementById("mon").value;
 let s=document.getElementById("size").value;
 document.getElementById("order").value += `${q} ${m} ${s}\n`;
}

function tinhTien(){
 
 let lines=document.getElementById("order").value.trim().split("\n");
 let tong=0;
 let out="";
 for(let line of lines){
  if(!line.trim()) continue;
  let a=line.trim().split(/\s+/);
  let qty=parseInt(a[0]);
  let size=parseInt(a[a.length-1]);
  let ten=a.slice(1,-1).join(" ");
  if(menu[ten]&&menu[ten][size]){
    let tt=menu[ten][size]*qty;
    tong+=tt;
    out+=`${qty} x ${ten} (${size}ml) = ${tt}k\n`;
  }
 }
 out+="\nTỔNG: "+tong+"k";
 let kd=Number(document.getElementById("khachdua").value||0);
 if(kd>0) out+="\nKHÁCH ĐƯA: "+kd+"k\nTIỀN THỐI: "+(kd-tong)+"k";
 document.getElementById("bill").textContent=out;

 let today=new Date().toISOString().slice(0,10);
 let data=JSON.parse(localStorage.getItem("revenue")||"{}");
 data[today]=(data[today]||0)+tong;
 localStorage.setItem("revenue",JSON.stringify(data));
 loadRevenue();
}
 function donMoi(){

  if(confirm("Tạo đơn mới?")){

      document.getElementById("order").value = "";

      document.getElementById("bill").textContent = "";

      document.getElementById("khachdua").value = "";

  }

}

function loadRevenue(){
 let today=new Date().toISOString().slice(0,10);
 let data=JSON.parse(localStorage.getItem("revenue")||"{}");
 document.getElementById("revenue").innerHTML=
 "<b>Ngày:</b> "+today+"<br><b>Doanh thu:</b> "+(data[today]||0)+"k";
}

function resetRevenue(){
 localStorage.removeItem("revenue");
 loadRevenue();
}
 function locMon(){

    const keyword =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    const select =
    document.getElementById("mon");

    select.innerHTML = "";

    Object.keys(menu)
    .filter(mon =>
        mon.includes(keyword)
    )
    .sort()
    .forEach(mon => {

        const option =
        document.createElement("option");

        option.value = mon;
        option.textContent = mon;

        select.appendChild(option);

    });

}

loadRevenue();

if ('serviceWorker' in navigator) {
 window.addEventListener('load', ()=>{});
}
</script>

<div class="card">
<b>Add to Home Screen:</b><br>
Safari → Chia sẻ → Thêm vào Màn hình chính.
</div>
</body>
</html>
